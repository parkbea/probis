<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOBIS — Kanban Operations & Business Intelligence Suite</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .kanban-col{min-height:320px;transition:background .15s,border .15s}
  .drop-active{background:rgba(99,102,241,.06)!important;border:2px dashed #6366f1!important;border-radius:.5rem}
  .card-dragging{opacity:.35;transform:rotate(1.5deg);pointer-events:none}
  .project-card{cursor:grab;transition:box-shadow .15s,transform .15s}
  .project-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);transform:translateY(-2px)}
  .project-card:active{cursor:grabbing}
  ::-webkit-scrollbar{width:4px;height:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
  @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toastIn{from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
  .anim-slide{animation:slideDown .2s ease-out}
  .anim-toast{animation:toastIn .3s ease-out}
  .modal-backdrop{background:rgba(15,23,42,.55);backdrop-filter:blur(3px)}
  .kobis-logo-wrap{background:linear-gradient(135deg,#4338ca 0%,#7c3aed 55%,#a855f7 100%);box-shadow:0 0 0 1px rgba(255,255,255,.12) inset,0 4px 16px rgba(99,102,241,.45)}
  .kobis-wordmark{background:linear-gradient(90deg,#e0e7ff,#c4b5fd 40%,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.12em;font-weight:800}
  .kobis-sub{letter-spacing:.22em;font-size:.6rem;text-transform:uppercase;color:#94a3b8;font-weight:500}
  .kobis-dot{color:#6366f1;margin:0 2px}
  .tab-btn{transition:all .15s;border-radius:.5rem;padding:.4rem .9rem;font-size:.78rem;font-weight:500;color:#64748b;display:inline-flex;align-items:center;gap:.35rem;white-space:nowrap}
  .tab-btn:hover{background:#f1f5f9;color:#1e293b}
  .tab-btn.active{background:#6366f1;color:white;box-shadow:0 2px 8px rgba(99,102,241,.35)}
  .gantt-bar{height:26px;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:11px;color:white;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:filter .15s;box-shadow:0 1px 4px rgba(0,0,0,.18)}
  .gantt-bar:hover{filter:brightness(1.12)}
  .gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;pointer-events:none;z-index:5}
  .cal-cell{min-height:96px;border-radius:8px;padding:4px 5px;transition:background .1s}
  .cal-cell:hover{background:#f8fafc}
  .cal-today{background:#eef2ff!important;border:1.5px solid #a5b4fc}
  .cal-other{opacity:.38}
  .cal-event{font-size:10px;line-height:1.4;padding:1px 5px;border-radius:4px;color:white;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .cal-event:hover{filter:brightness(1.1)}
  .cal-personal{border-left:3px solid;background:#f8fafc!important;color:#374151!important;font-size:10px;line-height:1.4;padding:1px 5px;border-radius:0 4px 4px 0;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .cal-personal:hover{background:#f1f5f9!important}
  .effort-track{height:6px;border-radius:3px;background:#e2e8f0;overflow:hidden}
  .effort-fill{height:100%;border-radius:3px;transition:width .5s}
  input[type=color]{width:32px;height:32px;border-radius:6px;border:1px solid #e2e8f0;padding:2px;cursor:pointer}
</style>
</head>
<body class="bg-slate-100 min-h-screen" style="font-family:'Pretendard','Noto Sans KR',sans-serif">

<!-- HEADER -->
<header class="bg-slate-800 text-white shadow-xl sticky top-0 z-40">
  <div class="max-w-screen-2xl mx-auto px-4 py-3 flex items-center justify-between gap-3 flex-wrap">
    <div class="flex items-center gap-3">
      <div class="kobis-logo-wrap w-11 h-11 rounded-2xl flex items-center justify-center flex-shrink-0 select-none">
        <svg viewBox="0 0 44 44" fill="none" class="w-9 h-9">
          <rect x="2"  y="3" width="12" height="3.5" rx="1" fill="white" opacity=".45"/>
          <rect x="16" y="3" width="12" height="3.5" rx="1" fill="white" opacity=".45"/>
          <rect x="30" y="3" width="12" height="3.5" rx="1" fill="white" opacity=".45"/>
          <rect x="2"  y="9"  width="12" height="7" rx="2" fill="white"/>
          <rect x="2"  y="18" width="12" height="7" rx="2" fill="white" opacity=".7"/>
          <rect x="2"  y="27" width="12" height="7" rx="2" fill="white" opacity=".4"/>
          <rect x="16" y="9"  width="12" height="7" rx="2" fill="white"/>
          <rect x="16" y="18" width="12" height="7" rx="2" fill="white" opacity=".7"/>
          <rect x="30" y="9"  width="12" height="7" rx="2" fill="white"/>
          <path d="M33 13l2 2 4-3.5" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <rect x="2" y="37" width="40" height="3" rx="1.5" fill="white" opacity=".2"/>
        </svg>
      </div>
      <div class="leading-none select-none">
        <h1 class="kobis-wordmark text-2xl leading-none">KOBIS</h1>
        <p class="kobis-sub mt-1">Kanban<span class="kobis-dot">·</span>Operations<span class="kobis-dot">·</span>Business<span class="kobis-dot">·</span>Intelligence<span class="kobis-dot">·</span>Suite</p>
      </div>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <button onclick="toggleEmailPanel()" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-violet-600 hover:bg-violet-500 rounded-lg text-xs font-medium transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>이메일 분석
      </button>
      <!-- Data file buttons -->
      <div class="flex items-center gap-1 bg-slate-700 rounded-lg px-2 py-1">
        <span class="text-xs text-slate-400 mr-1">JSON</span>
        <label title="projects.json 불러오기" class="inline-flex items-center gap-1 px-2 py-1 bg-blue-600 hover:bg-blue-500 rounded text-xs font-medium cursor-pointer transition-colors">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>프로젝트
          <input type="file" accept=".json" class="hidden" onchange="importFile(event,'projects')">
        </label>
        <label title="members.json 불러오기" class="inline-flex items-center gap-1 px-2 py-1 bg-emerald-600 hover:bg-emerald-500 rounded text-xs font-medium cursor-pointer transition-colors">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>팀원
          <input type="file" accept=".json" class="hidden" onchange="importFile(event,'members')">
        </label>
        <label title="personal_calendar.json 불러오기" class="inline-flex items-center gap-1 px-2 py-1 bg-pink-600 hover:bg-pink-500 rounded text-xs font-medium cursor-pointer transition-colors">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>일정
          <input type="file" accept=".json" class="hidden" onchange="importFile(event,'personal')">
        </label>
      </div>
      <div class="flex items-center gap-1 bg-slate-700 rounded-lg px-2 py-1">
        <span class="text-xs text-slate-400 mr-1">저장</span>
        <button onclick="exportFile('projects')" title="projects.json 저장" class="px-2 py-1 bg-blue-600 hover:bg-blue-500 rounded text-xs font-medium transition-colors">프로젝트</button>
        <button onclick="exportFile('members')" title="members.json 저장" class="px-2 py-1 bg-emerald-600 hover:bg-emerald-500 rounded text-xs font-medium transition-colors">팀원</button>
        <button onclick="exportFile('personal')" title="personal_calendar.json 저장" class="px-2 py-1 bg-pink-600 hover:bg-pink-500 rounded text-xs font-medium transition-colors">일정</button>
      </div>
      <button onclick="openCreateModal()" class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-xs font-semibold transition-colors shadow">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>프로젝트 추가
      </button>
    </div>
  </div>
</header>

<main class="max-w-screen-2xl mx-auto px-4 py-5 space-y-4">

  <!-- DASHBOARD -->
  <section id="dashboard" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3"></section>

  <!-- FILTER + TABS -->
  <div class="flex flex-wrap items-center gap-2 bg-white rounded-xl px-4 py-2.5 shadow-sm">
    <div class="flex-1 min-w-36 relative">
      <svg class="w-4 h-4 absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input id="search-input" type="text" placeholder="프로젝트명, 고객사 검색…" oninput="handleSearch(this.value)"
        class="w-full pl-8 pr-3 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <select id="status-filter" onchange="handleFilter(this.value)"
      class="px-3 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white">
      <option value="">전체 상태</option><option>대기</option><option>진행중</option><option>완료</option>
    </select>
    <span id="filter-count" class="text-xs text-slate-400"></span>
  </div>

  <!-- VIEW TABS -->
  <div class="flex items-center gap-1 bg-white rounded-xl px-2 py-2 shadow-sm overflow-x-auto">
    <button class="tab-btn active" id="tab-kanban" onclick="switchView('kanban')">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/></svg>칸반 보드
    </button>
    <button class="tab-btn" id="tab-gantt" onclick="switchView('gantt')">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>간트 차트
    </button>
    <button class="tab-btn" id="tab-calendar" onclick="switchView('calendar')">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>캘린더
    </button>
    <button class="tab-btn" id="tab-team" onclick="switchView('team')">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>팀 관리
    </button>
  </div>

  <!-- EMAIL PANEL -->
  <div id="email-panel" class="hidden anim-slide bg-white rounded-xl shadow-sm overflow-hidden border border-violet-100">
    <div class="flex items-center justify-between px-4 py-3 bg-violet-50 border-b border-violet-100">
      <h2 class="text-sm font-semibold text-violet-900 flex items-center gap-2">
        <span class="w-5 h-5 bg-violet-500 rounded-full flex items-center justify-center"><svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg></span>
        스마트 이메일 분석
      </h2>
      <button onclick="toggleEmailPanel()" class="text-violet-300 hover:text-violet-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
    </div>
    <div class="p-4 grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="space-y-2">
        <textarea id="email-text" rows="10" placeholder="이메일 전체 내용을 붙여넣으세요…"
          class="w-full px-3 py-2 text-xs border border-slate-200 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-violet-400 font-mono"></textarea>
        <button onclick="analyzeAndPreview()" class="w-full py-2 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-lg transition-colors">이메일 분석하기</button>
      </div>
      <div id="email-preview" class="hidden space-y-2">
        <div class="grid grid-cols-2 gap-2">
          <div><label class="block text-xs text-slate-500 mb-1">구분</label><select id="ep-type" class="w-full px-2 py-1.5 border border-slate-200 rounded text-xs bg-white focus:outline-none focus:ring-1 focus:ring-violet-400"><option value="RFI">RFI</option><option value="RFP">RFP</option><option value="실행중인 프로젝트">실행중인 프로젝트</option></select></div>
          <div><label class="block text-xs text-slate-500 mb-1">상태</label><select id="ep-status" class="w-full px-2 py-1.5 border border-slate-200 rounded text-xs bg-white focus:outline-none focus:ring-1 focus:ring-violet-400"><option>대기</option><option>진행중</option><option>완료</option></select></div>
        </div>
        <div><label class="block text-xs text-slate-500 mb-1">프로젝트명 *</label><input type="text" id="ep-name" class="w-full px-2 py-1.5 border border-slate-200 rounded text-xs focus:outline-none focus:ring-1 focus:ring-violet-400"></div>
        <div><label class="block text-xs text-slate-500 mb-1">고객사</label><input type="text" id="ep-client" class="w-full px-2 py-1.5 border border-slate-200 rounded text-xs focus:outline-none focus:ring-1 focus:ring-violet-400"></div>
        <div class="grid grid-cols-3 gap-2">
          <div><label class="block text-xs text-slate-500 mb-1">시작일</label><input type="date" id="ep-start" class="w-full px-2 py-1.5 border border-slate-200 rounded text-xs focus:outline-none focus:ring-1 focus:ring-violet-400"></div>
          <div><label class="block text-xs text-slate-500 mb-1">종료일</label><input type="date" id="ep-end" class="w-full px-2 py-1.5 border border-slate-200 rounded text-xs focus:outline-none focus:ring-1 focus:ring-violet-400"></div>
          <div><label class="block text-xs text-slate-500 mb-1">공수</label><div class="flex gap-1"><input type="number" id="ep-effort" step="0.5" min="0" class="w-full px-2 py-1.5 border border-slate-200 rounded text-xs focus:outline-none focus:ring-1 focus:ring-violet-400"><select id="ep-unit" class="px-1 py-1.5 border border-slate-200 rounded text-xs bg-white"><option>MM</option><option>MD</option></select></div></div>
        </div>
        <div><label class="block text-xs text-slate-500 mb-1">요약</label><textarea id="ep-summary" rows="3" class="w-full px-2 py-1.5 border border-slate-200 rounded text-xs resize-none focus:outline-none focus:ring-1 focus:ring-violet-400"></textarea></div>
        <button onclick="registerFromEmail()" class="w-full py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-lg transition-colors">프로젝트 등록</button>
      </div>
    </div>
  </div>

  <!-- VIEW: KANBAN -->
  <div id="view-kanban" class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col">
      <div class="bg-blue-500 px-4 py-2.5 flex items-center justify-between"><div class="flex items-center gap-2"><span class="font-bold text-white text-sm">RFI</span><span class="text-blue-100 text-xs">정보 요청</span></div><span id="count-RFI" class="bg-white text-blue-600 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span></div>
      <div id="col-RFI" class="kanban-col flex-1 p-3 space-y-2 overflow-y-auto" ondragover="handleDragOver(event,'RFI')" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event,'RFI')"></div>
    </div>
    <div class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col">
      <div class="bg-amber-500 px-4 py-2.5 flex items-center justify-between"><div class="flex items-center gap-2"><span class="font-bold text-white text-sm">RFP</span><span class="text-amber-100 text-xs">제안 요청</span></div><span id="count-RFP" class="bg-white text-amber-600 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span></div>
      <div id="col-RFP" class="kanban-col flex-1 p-3 space-y-2 overflow-y-auto" ondragover="handleDragOver(event,'RFP')" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event,'RFP')"></div>
    </div>
    <div class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col">
      <div class="bg-emerald-500 px-4 py-2.5 flex items-center justify-between"><span class="font-bold text-white text-sm">실행중인 프로젝트</span><span id="count-실행중인 프로젝트" class="bg-white text-emerald-600 text-xs font-bold px-2.5 py-0.5 rounded-full">0</span></div>
      <div id="col-실행중인 프로젝트" class="kanban-col flex-1 p-3 space-y-2 overflow-y-auto" ondragover="handleDragOver(event,'실행중인 프로젝트')" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event,'실행중인 프로젝트')"></div>
    </div>
  </div>

  <!-- VIEW: GANTT -->
  <div id="view-gantt" class="hidden bg-white rounded-xl shadow-sm overflow-hidden">
    <div class="px-5 py-3 border-b border-slate-100 flex items-center justify-between flex-wrap gap-2">
      <h2 class="font-semibold text-slate-700 text-sm">프로젝트 타임라인</h2>
      <div class="flex items-center gap-3 text-xs text-slate-400">
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-blue-500 inline-block"></span>RFI</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-amber-500 inline-block"></span>RFP</span>
        <span class="flex items-center gap-1"><span class="w-3 h-3 rounded bg-emerald-500 inline-block"></span>실행중</span>
        <span class="flex items-center gap-1"><span class="w-3 h-2 bg-red-400 inline-block"></span>오늘</span>
      </div>
    </div>
    <div id="gantt-body" class="p-4 overflow-x-auto"></div>
  </div>

  <!-- VIEW: CALENDAR -->
  <div id="view-calendar" class="hidden bg-white rounded-xl shadow-sm overflow-hidden">
    <div class="px-5 py-3 border-b border-slate-100 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <button onclick="moveMonth(-1)" class="p-1.5 hover:bg-slate-100 rounded-lg"><svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
        <h2 id="cal-title" class="font-semibold text-slate-700 text-sm w-28 text-center"></h2>
        <button onclick="moveMonth(1)" class="p-1.5 hover:bg-slate-100 rounded-lg"><svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg></button>
        <button onclick="calYear=new Date().getFullYear();calMonth=new Date().getMonth();renderCalendar()" class="text-xs text-indigo-600 hover:underline ml-1">오늘</button>
      </div>

<div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2 pointer-events-none"></div>

<script>
// ─────────────────────────────────────────────
// STATE  (3 separate data stores)
// ─────────────────────────────────────────────
const SK = { projects:'kobis_projects', members:'kobis_members', personal:'kobis_personal' };
let projects = [];
let members  = [];
let personal = [];   // personal calendar events

let draggedId = null;
let currentView = 'kanban';
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

// modal temp state
let currentProjectId = null;
let currentMemberId = null;
let currentPersonalId = null;
let modalAssignments = [];  // temp assignments while project modal is open

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
const uid = () => 'id_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
const now = () => new Date().toISOString();
function esc(s){ return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function fmtDate(iso){ if(!iso) return '-'; try{ return new Date(iso).toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}); }catch{ return iso; } }
function fmtShort(d){ if(!d) return '미정'; const dt=new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; }
function searchTerm(){ return document.getElementById('search-input').value.toLowerCase(); }
function statusFilter(){ return document.getElementById('status-filter').value; }

// ─────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────
function loadAll(){
  try{ const d=localStorage.getItem(SK.projects); if(d) projects=JSON.parse(d); }catch{}
  try{ const d=localStorage.getItem(SK.members);  if(d) members=JSON.parse(d);  }catch{}
  try{ const d=localStorage.getItem(SK.personal); if(d) personal=JSON.parse(d); }catch{}
}
function saveProjects(){ localStorage.setItem(SK.projects, JSON.stringify(projects)); }
function saveMembers(){  localStorage.setItem(SK.members,  JSON.stringify(members));  }
function savePersonal(){ localStorage.setItem(SK.personal, JSON.stringify(personal)); }

// ─────────────────────────────────────────────
// FILE I/O
// ─────────────────────────────────────────────
function exportFile(type){
  let data, filename;
  if(type==='projects'){ data={version:'1.0',exported:now(),projects}; filename='projects.json'; }
  else if(type==='members'){ data={version:'1.0',exported:now(),members}; filename='members.json'; }
  else{ data={version:'1.0',exported:now(),personalEvents:personal}; filename='personal_calendar.json'; }
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(`${filename} 저장 완료`,'success');
}
function importFile(e, type){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const data = JSON.parse(ev.target.result);
      if(type==='projects'){
        if(!Array.isArray(data.projects)) throw new Error();
        projects = data.projects; saveProjects();
        showToast(`프로젝트 ${projects.length}개 불러옴`,'success');
      } else if(type==='members'){
        if(!Array.isArray(data.members)) throw new Error();
        members = data.members; saveMembers();
        showToast(`팀원 ${members.length}명 불러옴`,'success');
      } else {
        const ev2 = data.personalEvents||data.events||[];
        if(!Array.isArray(ev2)) throw new Error();
        personal = ev2; savePersonal();
        showToast(`개인일정 ${personal.length}개 불러옴`,'success');
      }
      renderAll();
    } catch{ showToast('파일 형식이 맞지 않습니다','error'); }
  };
  reader.readAsText(file,'UTF-8');
  e.target.value='';
}

// ─────────────────────────────────────────────
// FILTER
// ─────────────────────────────────────────────
function filtered(){
  const q = searchTerm(); const sf = statusFilter();
  return projects.filter(p=>{
    const ms = !q || p.name.toLowerCase().includes(q) || (p.client||'').toLowerCase().includes(q);
    const mf = !sf || p.status === sf;
    return ms && mf;
  });
}
function handleSearch(){ renderKanban(); if(currentView==='gantt') renderGantt(); updateCount(); }
function handleFilter(){ renderKanban(); if(currentView==='gantt') renderGantt(); updateCount(); }
function updateCount(){
  const el=document.getElementById('filter-count');
  const t=projects.length, f=filtered().length;
  el.textContent = (searchTerm()||statusFilter()) ? `${f} / ${t} 건` : `총 ${t} 건`;
}

// ─────────────────────────────────────────────
// VIEW SWITCHING
// ─────────────────────────────────────────────
function switchView(v){
  currentView=v;
  ['kanban','gantt','calendar','team'].forEach(n=>{
    document.getElementById('view-'+n).classList.toggle('hidden', n!==v);
    document.getElementById('tab-'+n).classList.toggle('active', n===v);
  });
  if(v==='gantt') renderGantt();
  if(v==='calendar') renderCalendar();
  if(v==='team') renderTeam();
}

// ─────────────────────────────────────────────
// RENDER ALL
// ─────────────────────────────────────────────
function renderAll(){
  renderDashboard(); renderKanban(); updateCount();
  if(currentView==='gantt') renderGantt();
  if(currentView==='calendar') renderCalendar();
  if(currentView==='team') renderTeam();
}

// ─────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────
function renderDashboard(){
  const mm = projects.reduce((s,p)=>s+(p.effortUnit==='MD'?p.effort/20:p.effort),0);
  document.getElementById('dashboard').innerHTML = [

function renderCard(p){
  const sc={'대기':'bg-slate-100 text-slate-500','진행중':'bg-blue-100 text-blue-700','완료':'bg-emerald-100 text-emerald-700'};

  }).join('');
  return `<div class="project-card bg-white border border-slate-200 rounded-xl p-3 border-l-4 ${lc[p.type]||''}"
    draggable="true" ondragstart="dragStart(event,'${p.id}')" ondragend="dragEnd(event)" onclick="openEditModal('${p.id}')">
    <div class="flex items-start justify-between gap-2 mb-1.5">
      <h3 class="text-sm font-semibold text-slate-800 leading-snug flex-1 line-clamp-2">${esc(p.name)}</h3>
      <span class="text-xs px-1.5 py-0.5 rounded-full font-medium flex-shrink-0 ${sc[p.status]||''}">${p.status}</span>
    </div>
    ${p.client?`<p class="text-xs text-slate-400 mb-1.5 truncate">🏢 ${esc(p.client)}</p>`:''}
    ${p.summary?`<p class="text-xs text-slate-400 mb-2 line-clamp-2 leading-relaxed">${esc(p.summary)}</p>`:''}
    <div class="flex items-center justify-between text-xs text-slate-400 pt-2 border-t border-slate-50">
      <span>${fmtShort(p.startDate)} ${p.endDate?'~ '+fmtShort(p.endDate):''}</span>
      <span>${p.effort?`${p.effort} ${p.effortUnit}`:'공수 미정'}</span>
    </div>
    ${assigns.length?`<div class="mt-1.5 flex flex-wrap gap-1">${assigns.slice(0,3).map(a=>`<span class="text-xs bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded-full">${esc(a.name)}</span>`).join('')}${assigns.length>3?`<span class="text-xs text-slate-400">+${assigns.length-3}</span>`:''}</div>`:''}
    ${dd?`<div class="mt-1.5 text-xs ${dd.cls} font-medium">${dd.txt}</div>`:''}
    <div class="mt-2 flex gap-1 flex-wrap">${moveBtns}</div>
  </div>`;
}
function dDay(p){
  if(!p.endDate||p.status==='완료') return null;
  const today=new Date(); today.setHours(0,0,0,0);
  const diff=Math.ceil((new Date(p.endDate)-today)/86400000);
  if(diff<0)  return{txt:`${Math.abs(diff)}일 지연`,cls:'text-red-500'};
  if(diff===0)return{txt:'오늘 마감',cls:'text-red-500'};
  if(diff<=7) return{txt:`D-${diff}`,cls:'text-amber-500'};
  if(diff<=30)return{txt:`D-${diff}`,cls:'text-blue-400'};
  return null;
}

function dragStart(e,id){ draggedId=id; e.dataTransfer.effectAllowed='move'; setTimeout(()=>e.target.classList.add('card-dragging'),0); }
function dragEnd(e){ e.target.classList.remove('card-dragging'); document.querySelectorAll('.drop-active').forEach(el=>el.classList.remove('drop-active')); }
function handleDragOver(e,t){ e.preventDefault(); e.dataTransfer.dropEffect='move'; e.currentTarget.classList.add('drop-active'); }
function handleDragLeave(e){ if(!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drop-active'); }
function handleDrop(e,type){
  e.preventDefault(); e.currentTarget.classList.remove('drop-active');
  if(!draggedId) return;
  const p=projects.find(x=>x.id===draggedId);
  if(p&&p.type!==type){ p.type=type; p.updatedAt=now(); saveProjects(); renderAll(); showToast(`→ ${type}`,'success'); }
  draggedId=null;
}
function moveCard(e,id,type){ e.stopPropagation(); const p=projects.find(x=>x.id===id); if(p){ p.type=type; p.updatedAt=now(); saveProjects(); renderAll(); showToast(`→ ${type}`,'success'); } }

// GANTT
// ─────────────────────────────────────────────
function renderGantt(){
  const ps=filtered().filter(p=>p.startDate||p.endDate);
  const el=document.getElementById('gantt-body');
  if(!ps.length){ el.innerHTML=`<p class="text-center text-slate-400 py-16 text-sm">일정이 등록된 프로젝트가 없습니다.</p>`; return; }
  let minD=new Date(),maxD=new Date();
  ps.forEach(p=>{ if(p.startDate){const d=new Date(p.startDate);if(d<minD)minD=d;} if(p.endDate){const d=new Date(p.endDate);if(d>maxD)maxD=d;} });
  minD=new Date(minD.getFullYear(),minD.getMonth()-1,1);
  maxD=new Date(maxD.getFullYear(),maxD.getMonth()+2,0);
  const totalMs=maxD-minD;
  const months=[]; let cur=new Date(minD.getFullYear(),minD.getMonth(),1);
  while(cur<=maxD){ months.push(new Date(cur)); cur=new Date(cur.getFullYear(),cur.getMonth()+1,1); }
  const todayPct=Math.max(0,Math.min(100,((new Date())-minD)/totalMs*100));
  const tc={'RFI':'#3B82F6','RFP':'#F59E0B','실행중인 프로젝트':'#10B981'};
  const sa={'완료':'bb','진행중':'ff','대기':'88'};
  const LW=180;
  let html=`<div style="min-width:${LW+months.length*90}px">`;
  html+=`<div class="flex mb-1" style="padding-left:${LW}px">`;
  months.forEach(m=>{ html+=`<div class="text-xs text-slate-400 font-medium flex-shrink-0 text-center" style="width:${(1/months.length*100).toFixed(2)}%;min-width:80px">${m.getFullYear()}.${String(m.getMonth()+1).padStart(2,'0')}</div>`; });
  html+=`</div><div class="relative">`;
  months.forEach((m,i)=>{ if(i===0)return; const pct=((m-minD)/totalMs*100).toFixed(2); html+=`<div class="absolute top-0 bottom-0 w-px bg-slate-100" style="left:calc(${LW}px + ${pct}%)"></div>`; });
  html+=`<div class="gantt-today-line" style="left:calc(${LW}px + ${todayPct.toFixed(2)}%)"><span style="position:absolute;top:2px;left:1px;transform:translateX(-50%);font-size:9px;font-weight:700;color:#ef4444;background:white;border:1px solid #fca5a5;padding:0 3px;border-radius:3px;white-space:nowrap;z-index:6">TODAY</span></div>`;
  ps.forEach(p=>{
    const color=(tc[p.type]||'#6366f1')+(sa[p.status]||'ff');
    const sD=p.startDate?new Date(p.startDate):new Date(minD);
    const eD=p.endDate?new Date(p.endDate):new Date(maxD);
    const lPct=Math.max(0,((sD-minD)/totalMs*100));
    const wPct=Math.max(0.5,((eD-sD)/totalMs*100));
    html+=`<div class="flex items-center mb-2">
      <div class="flex-shrink-0 pr-3 text-right" style="width:${LW}px"><p class="text-xs font-semibold text-slate-700 truncate">${esc(p.name)}</p><p class="text-xs text-slate-400 truncate">${esc(p.client||'')}</p></div>
      <div class="flex-1 relative h-9 flex items-center">
        <div class="gantt-bar absolute" style="left:${lPct.toFixed(2)}%;width:${wPct.toFixed(2)}%;background:${color}" onclick="openEditModal('${p.id}')" title="${esc(p.name)}">${esc(p.name)}</div>
      </div>
    </div>`;
  });
  html+=`</div></div>`;
  el.innerHTML=html;
}

function moveMonth(dir){ calMonth+=dir; if(calMonth>11){calMonth=0;calYear++;} if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function renderCalendar(){
  document.getElementById('cal-title').textContent=`${calYear}년 ${calMonth+1}월`;
  const firstDow=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0);
  const tc={'RFI':'#3B82F6','RFP':'#F59E0B','실행중인 프로젝트':'#10B981'};

  // build event map: dateStr → [{kind, label, id, color}]
  const evMap={};
  const addEv=(ds,obj)=>{ if(!evMap[ds])evMap[ds]=[]; evMap[ds].push(obj); };
  projects.forEach(p=>{
    if(p.startDate) addEv(p.startDate,{kind:'project',label:'▶ '+p.name,id:p.id,color:tc[p.type]||'#6366f1'});
    if(p.endDate&&p.endDate!==p.startDate) addEv(p.endDate,{kind:'project',label:'■ '+p.name,id:p.id,color:tc[p.type]||'#6366f1'});
  });
  personal.forEach(ev=>{
    if(ev.startDate){
      // span all days of the event
      const s=new Date(ev.startDate), e=new Date(ev.endDate||ev.startDate);
      for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)){
        const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        addEv(ds,{kind:'personal',label:ev.title,id:ev.id,color:ev.color||'#ec4899'});
      }
    }
  });

  let html=''; let dc=0;
  for(let i=firstDow-1;i>=0;i--){ html+=`<div class="cal-cell cal-other"><span class="text-xs text-slate-300">${daysInPrev-i}</span></div>`; dc++; }
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(calYear,calMonth,d);
    const isToday=dt.getTime()===today.getTime();
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs=evMap[ds]||[];
    const dow=dt.getDay();
    const nc=dow===0?'text-red-400':dow===6?'text-blue-400':'text-slate-600';
    html+=`<div class="cal-cell ${isToday?'cal-today':''}" ondblclick="openPersonalEventModal('${ds}')">
      <span class="text-xs font-semibold ${nc}">${d}</span>`;
    evs.slice(0,3).forEach(ev=>{
      if(ev.kind==='project'){
        html+=`<div class="cal-event" style="background:${ev.color}" onclick="openEditModal('${ev.id}')" title="${esc(ev.label)}">${esc(ev.label)}</div>`;
      } else {
        html+=`<div class="cal-personal" style="border-color:${ev.color}" onclick="openPersonalEventEdit('${ev.id}')" title="${esc(ev.label)}">${esc(ev.label)}</div>`;
      }
    });
    if(evs.length>3) html+=`<div class="text-xs text-slate-400 mt-0.5 pl-1">+${evs.length-3}</div>`;
    html+=`</div>`; dc++;
  }
  const rem=(7-dc%7)%7;
  for(let d=1;d<=rem;d++){ html+=`<div class="cal-cell cal-other"><span class="text-xs text-slate-300">${d}</span></div>`; }
  document.getElementById('cal-grid').innerHTML=html;
}

function renderTeam(){
  const totalCapMM = members.reduce((s,m)=>s+(parseFloat(m.capacity)||1),0);
  const allocMap = {};

    const key=a.memberId||a.name;
    if(!allocMap[key]) allocMap[key]={totalMM:0,projects:[]};
    const mm=a.effortUnit==='MD'?a.effort/20:a.effort;
    allocMap[key].totalMM+=mm;
    allocMap[key].projects.push({name:p.name,type:p.type,effort:a.effort,effortUnit:a.effortUnit});
  }));
  const overloaded=members.filter(m=>(allocMap[m.id]||{}).totalMM>(parseFloat(m.capacity)||1)*1.5).length;

    tStatCard('전체 팀원','#6366F1',members.length,'명'),
    tStatCard('총 가용 공수','#10B981',totalCapMM.toFixed(1),'MM/월'),
    tStatCard('배정 공수','#F59E0B',Object.values(allocMap).reduce((s,v)=>s+v.totalMM,0).toFixed(1),'MM'),

  ].join('');

  const tc={'RFI':'#3B82F6','RFP':'#F59E0B','실행중인 프로젝트':'#10B981'};
  if(!members.length){
    document.getElementById('team-grid').innerHTML=`<div class="col-span-3 py-12 text-center"><p class="text-slate-400 text-sm">등록된 팀원이 없습니다.</p><p class="text-xs text-slate-300 mt-1">상단 "팀원 추가" 버튼을 클릭하세요.</p></div>`;

  document.getElementById('team-grid').innerHTML=members.map(m=>{
    const alloc=allocMap[m.id]||{totalMM:0,projects:[]};

      <div class="flex items-center gap-3 mb-3">
        <div class="w-9 h-9 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-sm flex-shrink-0">${esc(m.name.slice(0,1))}</div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold text-slate-800 truncate">${esc(m.name)}</p>
          <p class="text-xs text-slate-400">${esc(m.role||'')}${m.team?` · ${esc(m.team)}`:''}</p>
        </div>
        <div class="flex gap-1">
          <button onclick="openMemberEdit('${m.id}')" class="p-1 hover:bg-slate-100 rounded text-slate-400 hover:text-slate-600 transition-colors"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></button>
          <button onclick="deleteMember('${m.id}')" class="p-1 hover:bg-red-50 rounded text-slate-400 hover:text-red-500 transition-colors"><svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>
        </div>
      </div>
      <div class="mb-3">
        <div class="flex justify-between text-xs mb-1">
          <span class="text-slate-500">투입 공수</span>
          <span class="font-semibold ${alloc.totalMM>cap*1.5?'text-red-500':'text-slate-700'}">${alloc.totalMM.toFixed(1)} / ${cap} MM</span>

      ${m.email?`<p class="text-xs text-slate-300 mt-2 truncate">✉ ${esc(m.email)}</p>`:''}

function saveProjectModal(){

  if(!name){ showToast('프로젝트명은 필수입니다','error'); return; }
  const d={
    type:document.getElementById('m-type').value, name,
    client:document.getElementById('m-client').value.trim(),
    summary:document.getElementById('m-summary').value.trim(),
    startDate:document.getElementById('m-start').value,

// EMAIL ANALYSIS
// ─────────────────────────────────────────────
function toggleEmailPanel(){ document.getElementById('email-panel').classList.toggle('hidden'); }
function analyzeEmail(text){
  const r={name:'',client:'',summary:'',startDate:'',endDate:'',effort:'',effortUnit:'MM',type:'RFI',status:'대기'};
  if(/RFP|제안\s*요청/i.test(text)) r.type='RFP';
  else if(/착수|수주|계약\s*체결/i.test(text)) r.type='실행중인 프로젝트';
  if(/진행\s*중|착수|실행\s*중/i.test(text)) r.status='진행중';
  for(const pat of[/(?:프로젝트명|과제명|건명|제목)\s*[:：]\s*(.+?)(?:\n|$)/i,/(?:Subject)\s*[:：]\s*(?:re:\s*|fw:\s*)?(.+?)(?:\n|$)/i]){
    const m=text.match(pat); if(m?.[1]?.trim().length>2){ r.name=m[1].trim(); break; }
  }
  for(const pat of[/(?:고객사|발주처|의뢰처)\s*[:：]\s*(.+?)(?:\n|$)/i,/([\w가-힣]+(?:주식회사|\(주\)|㈜))/]){
    const m=text.match(pat); if(m?.[1]?.trim().length>1){ r.client=m[1].trim(); break; }
  }
  const dates=[]; ['(\\d{4})[./\\-](\\d{1,2})[./\\-](\\d{1,2})','(\\d{4})년\\s*(\\d{1,2})월\\s*(\\d{1,2})일'].forEach(rx=>{
    const re=new RegExp(rx,'g'); let m; while((m=re.exec(text))!==null){ const y=+m[1],mo=+m[2],d=+m[3]; if(y>=2020&&y<=2035&&mo>=1&&mo<=12&&d>=1&&d<=31) dates.push(`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`); }
  });
  r.startDate=dates[0]||''; r.endDate=dates.length>1?dates[dates.length-1]:'';
  const mMD=text.match(/(\d+(?:\.\d+)?)\s*(?:M[./]?D|man[\s-]?day|인일)/i);
  const mMM=text.match(/(\d+(?:\.\d+)?)\s*(?:M[./]?M|man[\s-]?month|인월)/i);
  if(mMD){r.effort=mMD[1];r.effortUnit='MD';}else if(mMM){r.effort=mMM[1];r.effortUnit='MM';}
  r.summary=text.split('\n').map(l=>l.trim()).filter(l=>l.length>20&&!/^[>※\-*]/.test(l)&&!/^(보낸|받는|from|to|subject|cc|re:|fw:)/i.test(l)).slice(0,3).join(' ').slice(0,300);
  return r;
}
function analyzeAndPreview(){
  const text=document.getElementById('email-text').value.trim(); if(!text){showToast('이메일을 입력하세요','warning');return;}
  const r=analyzeEmail(text);
  document.getElementById('ep-type').value=r.type; document.getElementById('ep-status').value=r.status;
  document.getElementById('ep-name').value=r.name; document.getElementById('ep-client').value=r.client;
  document.getElementById('ep-start').value=r.startDate; document.getElementById('ep-end').value=r.endDate;
  document.getElementById('ep-effort').value=r.effort; document.getElementById('ep-unit').value=r.effortUnit;
  document.getElementById('ep-summary').value=r.summary;
  document.getElementById('email-preview').classList.remove('hidden');
  showToast('분석 완료!','success');
}
function registerFromEmail(){
  const name=document.getElementById('ep-name').value.trim(); if(!name){showToast('프로젝트명 필수','error');return;}
  const client=document.getElementById('ep-client').value.trim();

  const dup=projects.find(p=>p.name.toLowerCase()===name.toLowerCase()&&(!client||(p.client||'').toLowerCase()===client.toLowerCase()));
  if(dup&&!confirm(`⚠️ 이미 등록된 프로젝트입니다.\n기존: "${dup.name}"\n\n그래도 등록하시겠습니까?`)) return;
  projects.push({id:uid(),type:document.getElementById('ep-type').value,name,client,summary:document.getElementById('ep-summary').value.trim(),startDate:document.getElementById('ep-start').value,endDate:document.getElementById('ep-end').value,effort:parseFloat(document.getElementById('ep-effort').value)||0,effortUnit:document.getElementById('ep-unit').value,status:document.getElementById('ep-status').value,emailContent,assignments:[],createdAt:now(),updatedAt:now()});
  saveProjects(); renderAll(); showToast(`"${name}" 등록됨`,'success');
  document.getElementById('email-text').value=''; document.getElementById('email-preview').classList.add('hidden');
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
function showToast(msg,type='info'){
  const colors={success:'bg-emerald-500',error:'bg-red-500',warning:'bg-amber-500',info:'bg-indigo-500'};
  const el=document.createElement('div');
  el.className=`anim-toast flex items-center gap-2 px-4 py-3 rounded-xl text-white text-sm shadow-xl max-w-xs pointer-events-auto ${colors[type]||colors.info}`;
  el.textContent=msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{el.style.transition='opacity .3s';el.style.opacity='0';setTimeout(()=>el.remove(),300);},3000);
}
