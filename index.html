<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOBIS — Kanban Operations & Business Intelligence Suite</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .kanban-col{min-height:320px;transition:background 0.15s,border 0.15s}
  .drop-active{background:rgba(99,102,241,0.06)!important;border:2px dashed #6366f1!important;border-radius:0.5rem}
  .card-dragging{opacity:0.35;transform:rotate(1.5deg);pointer-events:none}
  .project-card{cursor:grab;transition:box-shadow 0.15s,transform 0.15s}
  .project-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1);transform:translateY(-2px)}
  .project-card:active{cursor:grabbing}
  .scrollbar-thin::-webkit-scrollbar{width:4px}
  .scrollbar-thin::-webkit-scrollbar-track{background:transparent}
  .scrollbar-thin::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}
  @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toastIn{from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
  .anim-slide{animation:slideDown 0.2s ease-out}
  .anim-toast{animation:toastIn 0.3s ease-out}
  .modal-backdrop{background:rgba(15,23,42,0.55);backdrop-filter:blur(3px)}

  /* KOBIS brand */
  .kobis-logo-wrap{background:linear-gradient(135deg,#4338ca 0%,#7c3aed 55%,#a855f7 100%);box-shadow:0 0 0 1px rgba(255,255,255,0.12) inset,0 4px 16px rgba(99,102,241,0.45)}
  .kobis-wordmark{background:linear-gradient(90deg,#e0e7ff 0%,#c4b5fd 40%,#a5b4fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:0.12em;font-weight:800}
  .kobis-sub{letter-spacing:0.22em;font-size:0.6rem;text-transform:uppercase;color:#94a3b8;font-weight:500}
  .kobis-dot{color:#6366f1;margin:0 2px}
  @keyframes pulse-ring{0%,100%{box-shadow:0 0 0 1px rgba(255,255,255,0.12) inset,0 4px 16px rgba(99,102,241,0.45)}50%{box-shadow:0 0 0 1px rgba(255,255,255,0.18) inset,0 4px 24px rgba(139,92,246,0.65)}}
  .kobis-logo-wrap:hover{animation:pulse-ring 1.5s ease-in-out infinite}
</style>
</head>
<body class="bg-slate-100 min-h-screen" style="font-family:'Pretendard','Noto Sans KR',sans-serif">

<!-- ===== HEADER ===== -->
<header class="bg-slate-800 text-white shadow-xl sticky top-0 z-40">
  <div class="max-w-screen-2xl mx-auto px-4 py-3 flex items-center justify-between gap-3 flex-wrap">
    <div class="flex items-center gap-3">
      <!-- KOBIS Logo -->
      <div class="kobis-logo-wrap w-11 h-11 rounded-2xl flex items-center justify-center flex-shrink-0 transition-all duration-300 cursor-default select-none">
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-9 h-9">
          <!-- Kanban board: 3 columns -->
          <!-- Column headers -->
          <rect x="2"  y="3" width="12" height="3.5" rx="1" fill="white" opacity="0.45"/>
          <rect x="16" y="3" width="12" height="3.5" rx="1" fill="white" opacity="0.45"/>
          <rect x="30" y="3" width="12" height="3.5" rx="1" fill="white" opacity="0.45"/>
          <!-- Col 1 cards -->
          <rect x="2"  y="9"  width="12" height="7" rx="2" fill="white"/>
          <rect x="2"  y="18" width="12" height="7" rx="2" fill="white" opacity="0.7"/>
          <rect x="2"  y="27" width="12" height="7" rx="2" fill="white" opacity="0.4"/>
          <!-- Col 2 cards -->
          <rect x="16" y="9"  width="12" height="7" rx="2" fill="white"/>
          <rect x="16" y="18" width="12" height="7" rx="2" fill="white" opacity="0.7"/>
          <!-- Col 3 cards -->
          <rect x="30" y="9"  width="12" height="7" rx="2" fill="white"/>
          <!-- "done" checkmark accent on col 3 card -->
          <path d="M33 13l2 2 4-3.5" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <!-- Bottom accent bar -->
          <rect x="2" y="37" width="40" height="3" rx="1.5" fill="white" opacity="0.2"/>
        </svg>
      </div>

      <!-- Brand text -->
      <div class="leading-none select-none">
        <h1 class="kobis-wordmark text-2xl leading-none">KOBIS</h1>
        <p class="kobis-sub mt-1">
          Kanban<span class="kobis-dot">·</span>Operations<span class="kobis-dot">·</span>Business<span class="kobis-dot">·</span>Intelligence<span class="kobis-dot">·</span>Suite
        </p>
      </div>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
      <button onclick="toggleEmailPanel()" id="btn-email-panel"
        class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-violet-600 hover:bg-violet-500 rounded-lg text-xs font-medium transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>이메일 분석
      </button>
      <label class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-slate-600 hover:bg-slate-500 rounded-lg text-xs font-medium transition-colors cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>불러오기
        <input type="file" accept=".json" class="hidden" onchange="importJSON(event)">
      </label>
      <button onclick="exportJSON()"
        class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-slate-600 hover:bg-slate-500 rounded-lg text-xs font-medium transition-colors">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>저장하기
      </button>
      <button onclick="openCreateModal()"
        class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-xs font-semibold transition-colors shadow">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>프로젝트 추가
      </button>
    </div>
  </div>
</header>

<!-- ===== MAIN ===== -->
<main class="max-w-screen-2xl mx-auto px-4 py-5 space-y-4">

  <!-- DASHBOARD -->
  <section id="dashboard" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3"></section>

  <!-- FILTER BAR -->
  <div class="flex flex-wrap items-center gap-2 bg-white rounded-xl px-4 py-2.5 shadow-sm">
    <div class="flex-1 min-w-40 relative">
      <svg class="w-4 h-4 absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>
      <input id="search-input" type="text" placeholder="프로젝트명, 고객사 검색…"
        oninput="handleSearch(this.value)"
        class="w-full pl-8 pr-3 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
    </div>
    <select id="status-filter" onchange="handleFilter(this.value)"
      class="px-3 py-1.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white">
      <option value="">전체 상태</option>
      <option value="대기">대기</option>
      <option value="진행중">진행중</option>
      <option value="완료">완료</option>
    </select>
    <span id="filter-count" class="text-xs text-slate-400 ml-1"></span>
  </div>

  <!-- EMAIL ANALYSIS PANEL -->
  <div id="email-panel" class="hidden anim-slide bg-white rounded-xl shadow-sm overflow-hidden border border-violet-100">
    <div class="flex items-center justify-between px-4 py-3 bg-gradient-to-r from-violet-50 to-purple-50 border-b border-violet-100">
      <div class="flex items-center gap-2">
        <span class="w-6 h-6 bg-violet-500 rounded-full flex items-center justify-center">
          <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
          </svg>
        </span>
        <h2 class="text-sm font-semibold text-violet-900">스마트 이메일 분석 &amp; 자동 등록</h2>
        <span class="text-xs text-violet-400">이메일 본문을 붙여넣으면 항목을 자동 추출합니다</span>
      </div>
      <button onclick="toggleEmailPanel()" class="text-violet-300 hover:text-violet-600 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="p-4 grid grid-cols-1 lg:grid-cols-2 gap-4">
      <!-- LEFT: paste area -->
      <div class="space-y-2">
        <label class="block text-xs font-medium text-slate-600">이메일 본문 붙여넣기</label>
        <textarea id="email-text" rows="12"
          placeholder="이메일 전체 내용을 여기에 붙여넣으세요.

[예시 형식]
제목: [ABC프로젝트] 웹사이트 개발 제안 요청
발신: contact@abccorp.co.kr

안녕하세요, ABC 주식회사입니다.
웹사이트 리뉴얼 프로젝트 제안을 요청드립니다.

기간: 2024.06.01 ~ 2024.11.30
예상 공수: 6 MM"
          class="w-full px-3 py-2 text-xs border border-slate-200 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-violet-400 font-mono leading-relaxed text-slate-700 placeholder-slate-300"></textarea>
        <button onclick="analyzeAndPreview()"
          class="w-full py-2 bg-violet-600 hover:bg-violet-500 text-white text-sm font-medium rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>이메일 분석하기
        </button>
      </div>
      <!-- RIGHT: preview form -->
      <div id="email-preview" class="hidden space-y-2.5">
        <div class="flex items-center justify-between">
          <label class="text-xs font-medium text-slate-600">추출된 정보 확인 &amp; 수정</label>
          <span class="text-xs text-slate-400 bg-amber-50 text-amber-600 px-2 py-0.5 rounded-full">필드를 직접 수정할 수 있습니다</span>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <div>
            <label class="block text-xs text-slate-500 mb-1">구분</label>
            <select id="ep-type" class="w-full px-2 py-1.5 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-violet-400 bg-white">
              <option value="RFI">RFI (정보 요청)</option>
              <option value="RFP">RFP (제안 요청)</option>
              <option value="실행중인 프로젝트">실행중인 프로젝트</option>
            </select>
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">진행 상태</label>
            <select id="ep-status" class="w-full px-2 py-1.5 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-violet-400 bg-white">
              <option value="대기">대기</option>
              <option value="진행중">진행중</option>
              <option value="완료">완료</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">프로젝트명 <span class="text-red-400">*</span></label>
          <input type="text" id="ep-name" placeholder="프로젝트명"
            class="w-full px-2 py-1.5 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-violet-400">
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">고객사 / 발주처</label>
          <input type="text" id="ep-client" placeholder="고객사명"
            class="w-full px-2 py-1.5 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-violet-400">
        </div>
        <div class="grid grid-cols-3 gap-2">
          <div>
            <label class="block text-xs text-slate-500 mb-1">시작일</label>
            <input type="date" id="ep-start" class="w-full px-2 py-1.5 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-violet-400">
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">종료일</label>
            <input type="date" id="ep-end" class="w-full px-2 py-1.5 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-violet-400">
          </div>
          <div>
            <label class="block text-xs text-slate-500 mb-1">공수</label>
            <div class="flex gap-1">
              <input type="number" id="ep-effort" step="0.5" min="0" placeholder="0"
                class="w-full px-2 py-1.5 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-violet-400">
              <select id="ep-unit" class="px-1 py-1.5 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-1 focus:ring-violet-400 bg-white">
                <option>MM</option><option>MD</option>
              </select>
            </div>
          </div>
        </div>
        <div>
          <label class="block text-xs text-slate-500 mb-1">주요 내용 요약</label>
          <textarea id="ep-summary" rows="4"
            class="w-full px-2 py-1.5 border border-slate-200 rounded-lg text-xs resize-none focus:outline-none focus:ring-1 focus:ring-violet-400"></textarea>
        </div>
        <button onclick="registerFromEmail()"
          class="w-full py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>프로젝트 등록
        </button>
      </div>
    </div>
  </div>

  <!-- KANBAN BOARD -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

    <!-- RFI -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col">
      <div class="bg-blue-500 px-4 py-2.5 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="font-bold text-white text-sm">RFI</span>
          <span class="text-blue-100 text-xs">정보 요청</span>
        </div>
        <span id="count-RFI" class="bg-white text-blue-600 text-xs font-bold px-2.5 py-0.5 rounded-full min-w-[1.5rem] text-center">0</span>
      </div>
      <div id="col-RFI" class="kanban-col flex-1 p-3 space-y-2 overflow-y-auto scrollbar-thin"
        ondragover="handleDragOver(event,'RFI')" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event,'RFI')">
      </div>
    </div>

    <!-- RFP -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col">
      <div class="bg-amber-500 px-4 py-2.5 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="font-bold text-white text-sm">RFP</span>
          <span class="text-amber-100 text-xs">제안 요청</span>
        </div>
        <span id="count-RFP" class="bg-white text-amber-600 text-xs font-bold px-2.5 py-0.5 rounded-full min-w-[1.5rem] text-center">0</span>
      </div>
      <div id="col-RFP" class="kanban-col flex-1 p-3 space-y-2 overflow-y-auto scrollbar-thin"
        ondragover="handleDragOver(event,'RFP')" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event,'RFP')">
      </div>
    </div>

    <!-- 실행중인 프로젝트 -->
    <div class="bg-white rounded-xl shadow-sm overflow-hidden flex flex-col">
      <div class="bg-emerald-500 px-4 py-2.5 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="font-bold text-white text-sm">실행중인 프로젝트</span>
        </div>
        <span id="count-실행중인 프로젝트" class="bg-white text-emerald-600 text-xs font-bold px-2.5 py-0.5 rounded-full min-w-[1.5rem] text-center">0</span>
      </div>
      <div id="col-실행중인 프로젝트" class="kanban-col flex-1 p-3 space-y-2 overflow-y-auto scrollbar-thin"
        ondragover="handleDragOver(event,'실행중인 프로젝트')" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event,'실행중인 프로젝트')">
      </div>
    </div>

  </div>
</main>

<!-- ===== MODAL ===== -->
<div id="project-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
  <div class="modal-backdrop absolute inset-0" onclick="closeModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto anim-slide">
    <!-- Modal Header -->
    <div class="sticky top-0 bg-white z-10 flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <h2 id="modal-title" class="text-base font-bold text-slate-800">프로젝트 상세</h2>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <!-- Modal Body -->
    <div class="px-6 py-4 space-y-4">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">구분 <span class="text-red-400">*</span></label>
          <select id="m-type" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white">
            <option value="RFI">RFI (정보 요청)</option>
            <option value="RFP">RFP (제안 요청)</option>
            <option value="실행중인 프로젝트">실행중인 프로젝트</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">진행 상태 <span class="text-red-400">*</span></label>
          <select id="m-status" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white">
            <option value="대기">대기</option>
            <option value="진행중">진행중</option>
            <option value="완료">완료</option>
          </select>
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">프로젝트명 <span class="text-red-400">*</span></label>
        <input type="text" id="m-name" placeholder="프로젝트 이름을 입력하세요"
          class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">고객사 / 발주처</label>
        <input type="text" id="m-client" placeholder="고객사 또는 발주처"
          class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">주요 내용 요약</label>
        <textarea id="m-summary" rows="3" placeholder="프로젝트 주요 내용을 간략히 입력하세요"
          class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm resize-none focus:outline-none focus:ring-2 focus:ring-indigo-400"></textarea>
      </div>
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">시작일</label>
          <input type="date" id="m-start"
            class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">종료일</label>
          <input type="date" id="m-end"
            class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-1">예상 공수</label>
          <div class="flex gap-1">
            <input type="number" id="m-effort" step="0.5" min="0" placeholder="0"
              class="flex-1 min-w-0 px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <select id="m-unit" class="px-2 py-2 border border-slate-200 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-400 bg-white">
              <option>MM</option><option>MD</option>
            </select>
          </div>
        </div>
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 mb-1">원본 이메일 내용</label>
        <textarea id="m-email" rows="5" placeholder="원본 이메일 내용 (선택사항)"
          class="w-full px-3 py-2 border border-slate-200 rounded-lg text-xs resize-none focus:outline-none focus:ring-2 focus:ring-indigo-400 font-mono leading-relaxed"></textarea>
      </div>
      <div id="m-meta" class="hidden bg-slate-50 rounded-lg px-3 py-2 grid grid-cols-2 gap-1 text-xs text-slate-400">
        <span>등록일: <span id="m-created" class="text-slate-500"></span></span>
        <span>최종 수정: <span id="m-updated" class="text-slate-500"></span></span>
      </div>
    </div>
    <!-- Modal Footer -->
    <div class="sticky bottom-0 bg-white border-t border-slate-100 px-6 py-3 flex items-center justify-between">
      <button id="btn-delete" onclick="deleteCurrentProject()"
        class="hidden items-center gap-1.5 px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 text-sm font-medium rounded-lg transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>삭제
      </button>
      <div class="flex gap-2 ml-auto">
        <button onclick="closeModal()" class="px-4 py-2 text-slate-500 hover:bg-slate-100 text-sm font-medium rounded-lg transition-colors">취소</button>
        <button onclick="saveModal()" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold rounded-lg transition-colors shadow-sm flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>저장
        </button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container" class="fixed bottom-5 right-5 z-50 space-y-2 pointer-events-none"></div>

<script>
// =====================================================================
// STATE
// =====================================================================
const STORAGE_KEY = 'pm_data_v1';
let state = { projects: [] };
let draggedId = null;
let currentModalId = null;
let searchTerm = '';
let statusFilter = '';

// =====================================================================
// UTILS
// =====================================================================
const uid = () => 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,9);
const nowISO = () => new Date().toISOString();

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '-';
  try { return new Date(iso).toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}); }
  catch { return iso; }
}

function fmtShort(d) {
  if (!d) return '미정';
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}

// =====================================================================
// STORAGE
// =====================================================================
function load() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) { state = JSON.parse(s); if (!state.projects) state.projects = []; }
  } catch { state = { projects: [] }; }
}

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

// =====================================================================
// CRUD
// =====================================================================
function createProject(d) {
  const p = {
    id: uid(), type: d.type||'RFI', name: d.name||'제목 없음',
    client: d.client||'', summary: d.summary||'',
    effort: parseFloat(d.effort)||0, effortUnit: d.effortUnit||'MM',
    startDate: d.startDate||'', endDate: d.endDate||'',
    status: d.status||'대기', emailContent: d.emailContent||'',
    createdAt: nowISO(), updatedAt: nowISO()
  };
  state.projects.push(p);
  save(); renderAll(); return p;
}

function updateProject(id, d) {
  const i = state.projects.findIndex(p => p.id === id);
  if (i < 0) return;
  state.projects[i] = { ...state.projects[i], ...d, id, createdAt: state.projects[i].createdAt, updatedAt: nowISO() };
  save(); renderAll();
}

function deleteProject(id) {
  state.projects = state.projects.filter(p => p.id !== id);
  save(); renderAll();
}

// =====================================================================
// FILTER
// =====================================================================
function filtered() {
  const q = searchTerm.toLowerCase();
  return state.projects.filter(p => {
    const ms = !q || p.name.toLowerCase().includes(q) || (p.client||'').toLowerCase().includes(q) || (p.summary||'').toLowerCase().includes(q);
    const mf = !statusFilter || p.status === statusFilter;
    return ms && mf;
  });
}

function handleSearch(v) { searchTerm = v; renderKanban(); updateCount(); }
function handleFilter(v) { statusFilter = v; renderKanban(); updateCount(); }

function updateCount() {
  const el = document.getElementById('filter-count');
  const t = state.projects.length, f = filtered().length;
  el.textContent = (searchTerm || statusFilter) ? `${f} / ${t} 건` : `총 ${t} 건`;
}

// =====================================================================
// RENDER ALL
// =====================================================================
function renderAll() { renderDashboard(); renderKanban(); updateCount(); }

// =====================================================================
// DASHBOARD
// =====================================================================
function renderDashboard() {
  const ps = state.projects;
  const rfi = ps.filter(p=>p.type==='RFI').length;
  const rfp = ps.filter(p=>p.type==='RFP').length;
  const run = ps.filter(p=>p.type==='실행중인 프로젝트').length;
  const mm = ps.reduce((s,p)=> s + (p.effortUnit==='MD' ? p.effort/20 : p.effort), 0);
  const ing = ps.filter(p=>p.status==='진행중').length;

  document.getElementById('dashboard').innerHTML = [
    card('전체 프로젝트', ps.length, '건', '#6366F1',
      'M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10'),
    card('RFI', rfi, '건', '#3B82F6',
      'M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z'),
    card('RFP', rfp, '건', '#F59E0B',
      'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z'),
    card('실행중인 프로젝트', run, '건', '#10B981',
      'M13 10V3L4 14h7v7l9-11h-7z'),
    card('총 예상 공수', mm.toFixed(1), 'MM', '#8B5CF6',
      'M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z'),
  ].join('');
}

function card(label, val, unit, color, path) {
  return `<div class="bg-white rounded-xl px-4 py-3 shadow-sm flex items-center gap-3 border-l-4" style="border-color:${color}">
    <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" style="background:${color}1a">
      <svg class="w-5 h-5" fill="none" stroke="${color}" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${path}"/></svg>
    </div>
    <div><p class="text-xs text-slate-500">${label}</p>
    <p class="text-xl font-bold text-slate-800 leading-tight">${val} <span class="text-sm font-normal text-slate-400">${unit}</span></p></div>
  </div>`;
}

// =====================================================================
// KANBAN
// =====================================================================
function renderKanban() {
  const cols = { 'RFI':[], 'RFP':[], '실행중인 프로젝트':[] };
  filtered().forEach(p => { if (cols[p.type]) cols[p.type].push(p); });

  ['RFI','RFP','실행중인 프로젝트'].forEach(type => {
    const col = document.getElementById('col-' + type);
    const cnt = document.getElementById('count-' + type);
    const total = state.projects.filter(p=>p.type===type).length;
    cnt.textContent = total;
    col.innerHTML = cols[type].length ? cols[type].map(renderCard).join('') : emptyState();
  });
}

function emptyState() {
  return `<div class="flex flex-col items-center justify-center py-10 text-slate-300 select-none">
    <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
    </svg>
    <p class="text-xs">프로젝트가 없습니다</p>
    <p class="text-xs mt-0.5">여기로 카드를 드래그하세요</p>
  </div>`;
}

function renderCard(p) {
  const sColor = { '대기':'bg-slate-100 text-slate-500', '진행중':'bg-blue-100 text-blue-700', '완료':'bg-emerald-100 text-emerald-700' };
  const lColor = { 'RFI':'border-blue-400', 'RFP':'border-amber-400', '실행중인 프로젝트':'border-emerald-400' };
  const dd = dDay(p);

  const moveBtns = ['RFI','RFP','실행중인 프로젝트']
    .filter(t => t !== p.type)
    .map(t => {
      const short = t === '실행중인 프로젝트' ? '실행' : t;
      const bc = t==='RFI' ? 'bg-blue-50 hover:bg-blue-100 text-blue-600' : t==='RFP' ? 'bg-amber-50 hover:bg-amber-100 text-amber-600' : 'bg-emerald-50 hover:bg-emerald-100 text-emerald-600';
      return `<button onclick="moveCard(event,'${p.id}','${t}')" class="text-xs px-2 py-0.5 rounded ${bc} transition-colors font-medium">→ ${short}</button>`;
    }).join('');

  return `<div class="project-card bg-white border border-slate-200 rounded-xl p-3 border-l-4 ${lColor[p.type]||''}"
    draggable="true" ondragstart="dragStart(event,'${p.id}')" ondragend="dragEnd(event)"
    onclick="openEditModal('${p.id}')">
    <div class="flex items-start justify-between gap-2 mb-1.5">
      <h3 class="text-sm font-semibold text-slate-800 leading-snug flex-1">${esc(p.name)}</h3>
      <span class="text-xs px-1.5 py-0.5 rounded-full font-medium flex-shrink-0 ${sColor[p.status]||'bg-slate-100 text-slate-500'}">${p.status}</span>
    </div>
    ${p.client ? `<p class="text-xs text-slate-400 mb-1.5 flex items-center gap-1">
      <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
      <span class="truncate">${esc(p.client)}</span></p>` : ''}
    ${p.summary ? `<p class="text-xs text-slate-400 mb-2 line-clamp-2 leading-relaxed">${esc(p.summary)}</p>` : ''}
    <div class="flex items-center justify-between text-xs text-slate-400 pt-2 border-t border-slate-50">
      <span class="flex items-center gap-1">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        ${fmtShort(p.startDate)} ${p.endDate ? '~ '+fmtShort(p.endDate) : ''}
      </span>
      <span class="flex items-center gap-1">
        ${p.effort ? `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>${p.effort} ${p.effortUnit}` : '공수 미정'}
      </span>
    </div>
    ${dd ? `<div class="mt-1.5 text-xs ${dd.cls} flex items-center gap-1 font-medium">
      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>${dd.txt}
    </div>` : ''}
    <div class="mt-2 flex gap-1 flex-wrap">${moveBtns}</div>
  </div>`;
}

function dDay(p) {
  if (!p.endDate || p.status === '완료') return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const end = new Date(p.endDate);
  const diff = Math.ceil((end - today) / 86400000);
  if (diff < 0) return { txt: `${Math.abs(diff)}일 지연`, cls: 'text-red-500' };
  if (diff === 0) return { txt: '오늘 마감', cls: 'text-red-500' };
  if (diff <= 7) return { txt: `D-${diff}`, cls: 'text-amber-500' };
  if (diff <= 30) return { txt: `D-${diff}`, cls: 'text-blue-400' };
  return null;
}

// =====================================================================
// DRAG & DROP
// =====================================================================
function dragStart(e, id) {
  draggedId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('card-dragging'), 0);
}
function dragEnd(e) {
  e.target.classList.remove('card-dragging');
  document.querySelectorAll('.drop-active').forEach(el => el.classList.remove('drop-active'));
}
function handleDragOver(e, type) {
  e.preventDefault(); e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-active');
}
function handleDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget))
    e.currentTarget.classList.remove('drop-active');
}
function handleDrop(e, type) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-active');
  if (!draggedId) return;
  const p = state.projects.find(x => x.id === draggedId);
  if (p && p.type !== type) {
    updateProject(draggedId, { type });
    showToast(`"${p.name}" → ${type}`, 'success');
  }
  draggedId = null;
}
function moveCard(e, id, type) {
  e.stopPropagation();
  const p = state.projects.find(x => x.id === id);
  if (p) { updateProject(id, { type }); showToast(`"${p.name}" → ${type}`, 'success'); }
}

// =====================================================================
// MODAL
// =====================================================================
function openCreateModal(prefill) {
  currentModalId = null;
  document.getElementById('modal-title').textContent = '새 프로젝트 등록';
  const f = prefill || {};
  document.getElementById('m-type').value = f.type || 'RFI';
  document.getElementById('m-status').value = f.status || '대기';
  document.getElementById('m-name').value = f.name || '';
  document.getElementById('m-client').value = f.client || '';
  document.getElementById('m-summary').value = f.summary || '';
  document.getElementById('m-start').value = f.startDate || '';
  document.getElementById('m-end').value = f.endDate || '';
  document.getElementById('m-effort').value = f.effort || '';
  document.getElementById('m-unit').value = f.effortUnit || 'MM';
  document.getElementById('m-email').value = f.emailContent || '';
  document.getElementById('m-meta').classList.add('hidden');
  const btn = document.getElementById('btn-delete');
  btn.classList.add('hidden'); btn.style.display = '';
  showModal();
}

function openEditModal(id) {
  const p = state.projects.find(x => x.id === id);
  if (!p) return;
  currentModalId = id;
  document.getElementById('modal-title').textContent = '프로젝트 편집';
  document.getElementById('m-type').value = p.type;
  document.getElementById('m-status').value = p.status;
  document.getElementById('m-name').value = p.name;
  document.getElementById('m-client').value = p.client || '';
  document.getElementById('m-summary').value = p.summary || '';
  document.getElementById('m-start').value = p.startDate || '';
  document.getElementById('m-end').value = p.endDate || '';
  document.getElementById('m-effort').value = p.effort || '';
  document.getElementById('m-unit').value = p.effortUnit || 'MM';
  document.getElementById('m-email').value = p.emailContent || '';
  document.getElementById('m-created').textContent = fmtDate(p.createdAt);
  document.getElementById('m-updated').textContent = fmtDate(p.updatedAt);
  document.getElementById('m-meta').classList.remove('hidden');
  const btn = document.getElementById('btn-delete');
  btn.classList.remove('hidden'); btn.style.display = 'inline-flex';
  showModal();
}

function showModal() {
  document.getElementById('project-modal').classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  setTimeout(() => document.getElementById('m-name').focus(), 100);
}

function closeModal() {
  document.getElementById('project-modal').classList.add('hidden');
  document.body.style.overflow = '';
}

function saveModal() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { showToast('프로젝트명은 필수 항목입니다.', 'error'); document.getElementById('m-name').focus(); return; }
  const d = {
    type: document.getElementById('m-type').value,
    name, client: document.getElementById('m-client').value.trim(),
    summary: document.getElementById('m-summary').value.trim(),
    startDate: document.getElementById('m-start').value,
    endDate: document.getElementById('m-end').value,
    effort: parseFloat(document.getElementById('m-effort').value) || 0,
    effortUnit: document.getElementById('m-unit').value,
    status: document.getElementById('m-status').value,
    emailContent: document.getElementById('m-email').value.trim()
  };
  if (currentModalId) { updateProject(currentModalId, d); showToast('프로젝트가 수정되었습니다.', 'success'); }
  else { createProject(d); showToast('프로젝트가 등록되었습니다.', 'success'); }
  closeModal();
}

function deleteCurrentProject() {
  if (!currentModalId) return;
  const p = state.projects.find(x => x.id === currentModalId);
  if (!p) return;
  if (!confirm(`"${p.name}" 프로젝트를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  deleteProject(currentModalId);
  closeModal();
  showToast('프로젝트가 삭제되었습니다.', 'info');
}

// =====================================================================
// EMAIL ANALYSIS
// =====================================================================
function toggleEmailPanel() {
  const panel = document.getElementById('email-panel');
  const hidden = panel.classList.toggle('hidden');
  if (!hidden) { panel.classList.add('anim-slide'); document.getElementById('email-text').focus(); }
}

function analyzeEmail(text) {
  const r = { name:'', client:'', summary:'', startDate:'', endDate:'', effort:'', effortUnit:'MM', type:'RFI', status:'대기' };

  // Type detection
  if (/RFP|제안\s*요청|제안서\s*(작성|요청|제출)/i.test(text)) r.type = 'RFP';
  else if (/착수|수주|계약\s*체결|프로젝트\s*시작|실행/i.test(text)) r.type = '실행중인 프로젝트';

  // Status
  if (/진행\s*중|착수|실행\s*중|수행\s*중/i.test(text)) r.status = '진행중';
  else if (/완료|완성|종료됨/i.test(text)) r.status = '완료';

  // Project name
  for (const pat of [
    /(?:프로젝트명|과제명|사업명|건명|제목)\s*[:：]\s*(.+?)(?:\n|$)/i,
    /(?:Subject|Re|Fw)\s*[:：]\s*(?:re:\s*|fw:\s*)?(.+?)(?:\n|$)/i,
    /\[([가-힣\w\s]{3,40}(?:시스템|플랫폼|개발|구축|분석|운영|서비스|솔루션|프로젝트|사업))\]/,
  ]) {
    const m = text.match(pat);
    if (m?.[1]?.trim().length > 2) { r.name = m[1].trim().replace(/\s+/g,' '); break; }
  }

  // Client
  for (const pat of [
    /(?:고객사|발주처|의뢰처|요청처|클라이언트)\s*[:：]\s*(.+?)(?:\n|$)/i,
    /(?:보낸\s*사람|발신|From)\s*[:：]\s*.+?@([\w.-]+)\./i,
    /([\w가-힣]+(?:주식회사|\(주\)|㈜|Co\.\s*Ltd\.|Inc\.?))/,
  ]) {
    const m = text.match(pat);
    if (m?.[1]?.trim().length > 1) { r.client = m[1].trim(); break; }
  }

  // Dates - collect all valid dates
  const dates = [];
  const reDates = [
    /(\d{4})[./\-](\d{1,2})[./\-](\d{1,2})/g,
    /(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/g,
  ];
  for (const re of reDates) {
    const rx = new RegExp(re.source, 'g');
    let m;
    while ((m = rx.exec(text)) !== null) {
      const y=parseInt(m[1]), mo=parseInt(m[2]), d=parseInt(m[3]);
      if (y>=2020&&y<=2035&&mo>=1&&mo<=12&&d>=1&&d<=31)
        dates.push(`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    }
  }

  // Labeled dates take priority
  const sLbl = text.match(/(?:시작일|착수일|개시일|시작\s*일자)\s*[:：]\s*(\d{4}[./\-년]\d{1,2}[./\-월]\d{1,2}일?)/);
  const eLbl = text.match(/(?:종료일|완료일|납기일|마감일|기한)\s*[:：]\s*(\d{4}[./\-년]\d{1,2}[./\-월]\d{1,2}일?)/);

  r.startDate = sLbl ? normDate(sLbl[1]) : (dates[0] || '');
  r.endDate   = eLbl ? normDate(eLbl[1]) : (dates.length>1 ? dates[dates.length-1] : '');

  // Effort
  const mMD = text.match(/(\d+(?:\.\d+)?)\s*(?:M[./]?D|man[\s-]?day|인일)/i);
  const mMM = text.match(/(\d+(?:\.\d+)?)\s*(?:M[./]?M|man[\s-]?month|인월)/i);
  if (mMD) { r.effort = mMD[1]; r.effortUnit = 'MD'; }
  else if (mMM) { r.effort = mMM[1]; r.effortUnit = 'MM'; }

  // Summary
  const lines = text.split('\n').map(l=>l.trim())
    .filter(l => l.length>20 && !/^[>※\-*=]/.test(l) && !/^(보낸|받는|수신|발신|from|to|subject|cc|re:|fw:|date:|날짜)/i.test(l));
  r.summary = lines.slice(0,3).join(' ').slice(0,300);

  return r;
}

function normDate(s) {
  const m = s.match(/(\d{4})[./\-년]\s*(\d{1,2})[./\-월]\s*(\d{1,2})/);
  if (!m) return '';
  return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
}

function analyzeAndPreview() {
  const text = document.getElementById('email-text').value.trim();
  if (!text) { showToast('이메일 내용을 먼저 입력해주세요.', 'warning'); return; }

  const r = analyzeEmail(text);
  document.getElementById('ep-type').value = r.type;
  document.getElementById('ep-status').value = r.status;
  document.getElementById('ep-name').value = r.name;
  document.getElementById('ep-client').value = r.client;
  document.getElementById('ep-start').value = r.startDate;
  document.getElementById('ep-end').value = r.endDate;
  document.getElementById('ep-effort').value = r.effort;
  document.getElementById('ep-unit').value = r.effortUnit;
  document.getElementById('ep-summary').value = r.summary;

  const prev = document.getElementById('email-preview');
  prev.classList.remove('hidden');
  prev.classList.add('anim-slide');
  showToast('분석 완료! 추출된 정보를 확인 후 등록하세요.', 'success');
}

function checkDuplicate(name, client, email) {
  const n = name.trim().toLowerCase();
  const c = client.trim().toLowerCase();
  for (const p of state.projects) {
    const pn = p.name.toLowerCase(), pc = (p.client||'').toLowerCase();
    if (n && pn===n && (!c || !pc || pc===c)) return p;
    if (n.length>5 && (pn.includes(n)||n.includes(pn)) && (!c||!pc||pc===c)) return p;
    if (email && p.emailContent) {
      const snip = email.slice(0,80).toLowerCase();
      if (snip.length>30 && p.emailContent.toLowerCase().includes(snip.slice(0,40))) return p;
    }
  }
  return null;
}

function registerFromEmail() {
  const name = document.getElementById('ep-name').value.trim();
  if (!name) { showToast('프로젝트명은 필수 항목입니다.', 'error'); document.getElementById('ep-name').focus(); return; }

  const client = document.getElementById('ep-client').value.trim();
  const emailContent = document.getElementById('email-text').value.trim();
  const dup = checkDuplicate(name, client, emailContent);

  if (dup) {
    const ok = confirm(`⚠️ 이미 등록된 프로젝트입니다.\n\n기존: "${dup.name}" (${dup.client||'고객사 없음'})\n\n그래도 새로 등록하시겠습니까?`);
    if (!ok) return;
  }

  createProject({
    type: document.getElementById('ep-type').value,
    name, client,
    summary: document.getElementById('ep-summary').value.trim(),
    startDate: document.getElementById('ep-start').value,
    endDate: document.getElementById('ep-end').value,
    effort: parseFloat(document.getElementById('ep-effort').value)||0,
    effortUnit: document.getElementById('ep-unit').value,
    status: document.getElementById('ep-status').value,
    emailContent
  });

  showToast(`"${name}" 등록 완료!`, 'success');
  document.getElementById('email-text').value = '';
  document.getElementById('email-preview').classList.add('hidden');
}

// =====================================================================
// FILE I/O
// =====================================================================
function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `project_data_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('JSON 파일로 저장되었습니다.', 'success');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data.projects)) { showToast('올바른 형식의 JSON이 아닙니다.', 'error'); return; }
      if (state.projects.length > 0) {
        const choice = confirm(
          `현재 ${state.projects.length}개 프로젝트가 있습니다.\n\n` +
          `[확인] 불러온 데이터(${data.projects.length}개)로 교체\n` +
          `[취소] 기존 데이터에 병합`
        );
        if (!choice) {
          let added = 0;
          data.projects.forEach(p => {
            if (!state.projects.find(x => x.id === p.id)) { state.projects.push(p); added++; }
          });
          save(); renderAll(); showToast(`${added}개 프로젝트가 병합되었습니다.`, 'success');
          return;
        }
      }
      state = data; save(); renderAll();
      showToast(`${data.projects.length}개 프로젝트를 불러왔습니다.`, 'success');
    } catch { showToast('파일을 읽는 중 오류가 발생했습니다.', 'error'); }
  };
  reader.readAsText(file, 'UTF-8');
  e.target.value = '';
}

// =====================================================================
// TOAST
// =====================================================================
function showToast(msg, type='info') {
  const colors = { success:'bg-emerald-500', error:'bg-red-500', warning:'bg-amber-500', info:'bg-indigo-500' };
  const icons = {
    success:'M5 13l4 4L19 7',
    error:'M6 18L18 6M6 6l12 12',
    warning:'M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z',
    info:'M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z'
  };
  const el = document.createElement('div');
  el.className = `anim-toast flex items-center gap-2 px-4 py-3 rounded-xl text-white text-sm shadow-xl max-w-xs pointer-events-auto ${colors[type]||colors.info}`;
  el.innerHTML = `<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${icons[type]||icons.info}"/></svg>
    <span>${msg}</span>`;
  const container = document.getElementById('toast-container');
  container.appendChild(el);
  setTimeout(() => { el.style.transition='opacity 0.3s'; el.style.opacity='0'; setTimeout(()=>el.remove(),300); }, 3500);
}
